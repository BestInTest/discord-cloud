name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build package
        run: mvn -B clean package

      - name: Upload artifact (linux-x64)
        uses: actions/upload-artifact@v7
        with:
          name: discord-cloud-linux-x64
          path: build/discord-cloud-*-linux-x64.zip
          if-no-files-found: error

      - name: Upload artifact (linux-arm64)
        uses: actions/upload-artifact@v7
        with:
          name: discord-cloud-linux-arm64
          path: build/discord-cloud-*-linux-arm64.zip
          if-no-files-found: error

      - name: Upload artifact (windows-x64)
        uses: actions/upload-artifact@v7
        with:
          name: discord-cloud-windows-x64
          path: build/discord-cloud-*-windows-x64.zip
          if-no-files-found: error

      - name: Upload artifact (slim)
        uses: actions/upload-artifact@v7
        with:
          name: discord-cloud-slim
          path: build/discord-cloud-*-slim.zip
          if-no-files-found: error

